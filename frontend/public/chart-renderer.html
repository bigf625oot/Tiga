<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Renderer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #chart-container { width: 100%; height: 100%; }
    </style>
    <!-- Import ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        let chartInstance = null;

        window.addEventListener('message', (event) => {
            const { type, data } = event.data;
            
            if (type === 'RENDER_CHART') {
                renderChart(data);
            } else if (type === 'RESIZE') {
                if (chartInstance) chartInstance.resize();
            }
        });

        function renderChart(option) {
            const container = document.getElementById('chart-container');
            
            if (!chartInstance) {
                chartInstance = echarts.init(container);
                window.addEventListener('resize', () => {
                    chartInstance.resize();
                });
            }
            
            try {
                // Security: Basic sanitization if needed, though option is JSON
                chartInstance.setOption(option, true);
                
                // Notify parent of success
                window.parent.postMessage({ type: 'CHART_RENDERED', success: true }, '*');
            } catch (e) {
                console.error('Chart render error:', e);
                window.parent.postMessage({ type: 'CHART_ERROR', error: e.message }, '*');
            }
        }
    </script>
</body>
</html>
